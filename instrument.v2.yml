name: codeframe
id: codeframe
version: 1.0.0

actions:
  start:
    commands:
      run-codeframe:
        id: run-codeframe
        dir: ${instrumentPath}
        command: >-
          java -jar codeframe.jar "${repo}" "${instrumentPath}/results/${repoName}.jsonl"

  summary:
    md-file: results/summary.md
    html-file: results/summary.html
    category: Structural Relationship
    commands:
      generate-summary:
        id: generate-summary
        dir: ${instrumentPath}
        command:
          windows: py -3 codeframe-summary.py "${instrumentPath}/results"
          unix: python3 codeframe-summary.py "${instrumentPath}/results"

  clean:
    with:
      locations:
        - source: ${instrumentDir}/results

  pack:
    with:
      locations:
        - source: ${instrumentDir}/results
          destination: /results
